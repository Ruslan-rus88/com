<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>ABC-Tier — COM</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Patrick+Hand&family=Gochi+Hand&display=swap" rel="stylesheet">
<link rel="stylesheet" href="css/style.css">
</head>
<body>

<header>
  <nav class="topnav">
    <a class="logo" href="index.html" aria-label="COM Startseite"><span>C</span><span>O</span><span>M</span></a>
    <div class="spacer"></div>
    <div class="nav-links">
      <a class="nav-btn orange" href="index.html">Start</a>
      <a class="nav-btn blue" href="gefaehrlich.html">Gefährlich!</a>
      <a class="nav-btn green active" href="abc.html">ABC-Tier</a>

      <a class="nav-btn orange tilt-r" href="freunde.html">Freunde</a>
    </div>
  </nav>
  <div class="wave orange"></div>
</header>

<main class="page centered">
  <h1 class="abc-title">Das ABC-Tier</h1>
  <p class="lead" style="margin-bottom: 30px;">Tippe einen Buchstaben — das ABC-Tier sagt ihn laut!</p>

  <div class="abc-creature">
    <svg width="260" height="200" viewBox="0 0 260 200" aria-hidden="true">
      <path d="M40 100 Q 30 55, 75 60 Q 85 30, 120 45 Q 150 25, 175 50 Q 220 45, 215 90 Q 235 110, 210 125 L 55 125 Q 25 120, 40 100 Z" fill="#9FC4E8" stroke="#5B9BD5" stroke-width="5"></path>
      <circle cx="170" cy="85" r="5" fill="#4A3B2A"></circle>
      <path d="M150 105 q 12 8, 24 0" stroke="#4A3B2A" stroke-width="3.5" fill="none" stroke-linecap="round"></path>
      <g stroke="#5B9BD5" stroke-width="4.5" stroke-linecap="round">
        <line x1="75" y1="125" x2="70" y2="168"></line>
        <line x1="125" y1="125" x2="123" y2="168"></line>
        <line x1="180" y1="125" x2="185" y2="168"></line>
      </g>
      <g font-family="Gochi Hand, cursive" font-size="24">
        <circle cx="70" cy="180" r="16" fill="#FFFDF8" stroke="#E8823C" stroke-width="3.5"></circle>
        <circle cx="123" cy="180" r="16" fill="#FFFDF8" stroke="#5B9BD5" stroke-width="3.5"></circle>
        <circle cx="185" cy="180" r="16" fill="#FFFDF8" stroke="#8CBF3F" stroke-width="3.5"></circle>
        <text x="62" y="189" fill="#E8823C">A</text><text x="116" y="189" fill="#5B9BD5">B</text><text x="178" y="189" fill="#8CBF3F">C</text>
      </g>
    </svg>
  </div>

  <div class="abc-bubble-slot" aria-live="polite"></div>

  <div class="abc-grid" id="buchstaben"></div>

  <div class="letter-game" id="spiel">
    <h2 class="letter-game-title">Buchstaben-Spiel</h2>
    <p class="letter-game-lead">Welcher Buchstabe fehlt? Tippe auf den richtigen!</p>
    <div class="letter-animal" aria-hidden="true"></div>
    <div class="letter-word-row">
      <div class="letter-word" aria-live="polite"></div>
      <button class="say-btn" aria-label="Tiername vorlesen" title="Vorlesen">🔊</button>
    </div>
    <div class="letter-options"></div>
    <p class="letter-feedback" hidden></p>
    <button class="next-animal" hidden>Nächstes Tier →</button>
  </div>
</main>

<footer>
  <div class="wave blue"></div>
  <p>COM · gemacht von Kindern, für Kinder</p>
</footer>

<script src="js/app.js"></script>
</body>
</html>
